

<div class="product-section">
  <div class="container">

    
    <div class="row">
        
      <div class="col-12 col-md-4 col-lg-3 mb-6 mb-md-0"
       *ngFor="let p of products()">
        
        <app-product-card
          [title]="p.name"
          [price]="p.price"
          [description]="p.description"
          
          [image]="'http://localhost:3000/uploads/' + p.image"
          (selectProduct)="handleProduct($event)"
          [id]="p._id"
          (viewDetail)="detailProduct($event)"
          (edit)="editProduct($event)"
          (delete)="deleteProduct($event)">
        </app-product-card>

      </div>

    </div>
  </div>
</div>
