<div class="product-edit-section py-5 bg-light min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-primary text-white py-3 px-4">
            <h2 class="h5 mb-0">Edit Product</h2>
          </div>
          <div class="card-body p-4">
            <form class="product-form" [formGroup]="form" (ngSubmit)="update()">
              <div class="mb-3">
                <app-form-field label="Product Name" type="text" 
        [control]="getControl('name')" required>
      </app-form-field>
              </div>

              <div class="mb-3">
                <app-form-field label="Price ($)" type="number"  [control]="getControl('price')" required>
      </app-form-field>
              </div>

              <div class="mb-3">
                <app-form-field label="Quantity" type="number"  [control]="getControl('qte')" required>
      </app-form-field>
              </div>

              <div class="mb-3">
                <app-form-field label="Description" type="textarea" 
        [control]="getControl('description')" required>
      </app-form-field>
              </div>

              <div class="mb-3">
                <app-image-field [maxSizeMB]="3" [allowedTypes]="['image/png','image/jpeg']" 
        (fileSelected)="onImageSelected($event)"  [initialImage]="preview"  (error)="onImageError($event)" required>
      </app-image-field>
              </div>

              <div class="d-flex justify-content-end gap-2 mt-4 pt-2">
                
                <app-button type="primary">Update Product</app-button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
