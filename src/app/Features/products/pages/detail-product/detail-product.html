
<div class="container py-5" *ngIf="product()" >
  <div class="row">
    <!-- Product Image -->
    <div class="col-12 col-md-6 mb-4">
      <div class="product-image-wrapper shadow-sm rounded overflow-hidden">
        <img  [src]="'https://furni-back-end.onrender.com/uploads/' + product().image" 
             alt="product" 
             class="img-fluid w-100 object-fit-cover">
      </div>
    </div>

    <!-- Product Info -->
    <div class="col-12 col-md-6 ps-md-5">
      <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a routerLink="/products" class="nav-link text-decoration-none text-muted">Products</a></li>
          <li class="breadcrumb-item active">{{ product().name }}</li>
        </ol>
      </nav>

      <h1 class="display-5 fw-bold mb-3">{{ product().name }}</h1>
      <p class="h2 text-primary mb-4">${{ product().price }}</p>
      
      <div class="description-section mb-4">
        <h5 class="fw-bold">Description</h5>
        <p class="text-muted lead">{{ product().description }}</p>
      </div>

      <div class="Quantity-section mb-4">
        <h5 class="fw-bold">Quantity : </h5>
        <p class="text-muted lead">{{ product().qte }}</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="addToCart(product())">
      <div class="action-section d-flex align-items-end gap-3 mb-5">
        
        <div class="quantity-input" style="max-width: 100px;">
          <app-form-field   label="Quantity"
    type="number"
    placeholder=""
    [control]="getControl('quantity')">
            </app-form-field>
          

        </div>
        <button type="submit" class="btn btn-primary btn-lg px-5 flex-grow-1 flex-md-grow-0" >
          Add to Cart
        </button>
      </div>
      </form>
    </div>
  </div>
</div>
