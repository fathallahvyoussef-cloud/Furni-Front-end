
<div class="signup-section vh-100">
    <div class="container-fluid h-100">
        <div class="row h-100">
            <!-- Visual/Brand Side -->
            <div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center bg-light p-5">
                <div class="text-center">
                    <img src="assets/images/why-choose-us-img.jpg" alt="Membership Benefits" class="img-fluid mb-4 rounded shadow-sm" style="max-height: 400px;">
                    <h2 class="section-title">Join our Community</h2>
                    <p class="text-muted">Get early access to modern collections and exclusive interior design studio tips.</p>
                </div>
            </div>

            <!-- Form Side -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center p-4 p-md-5 bg-white">
                <div class="form-wrapper w-100" style="max-width: 450px;">
                    <div class="mb-5">
                        <h2 class="h3 mb-2 font-weight-bold">Create an account</h2>
                        <p class="text-muted">Enter your details to build your dream interior.</p>
                    </div>
                    
                    <form [formGroup]="form" (ngSubmit)="signup()">

                        <div class="mb-3">
                            <app-form-field
    label="Full Name"
    type="text"
    placeholder="Enter your Full Name"
    [control]="getControl('name')">
  </app-form-field>
                        </div>
                        <div class="mb-3">
                            <app-form-field
    label="Email"
    type="email"
    placeholder="Enter your Email"
    [control]="getControl('email')">
  </app-form-field>
                        </div>
                        <div class="mb-3">
                            <app-form-field
    label="Password"
    type="password"
    placeholder="Minimum 8 characters"
    [control]="getControl('password')">
  </app-form-field>
                        </div>

                        <!-- adresse -->
                        <div class="mb-3">
                            <app-form-field
    label="Adresse"
    type="text"
    placeholder="Adress"
    [control]="getControl('adress')">
  </app-form-field>
                        </div>

                        <!-- phone number -->
                        <div class="mb-3">
                            <app-form-field
    label="Phone Number"
    type="text"
    placeholder="Enter you phone number"
    [control]="getControl('phone')">
  </app-form-field>
                        </div>


                        <div class="text-center">
                            <app-button   type="primary" >Register Now</app-button>
                        </div>
                        
                        </form>

                    <p class="text-center">Already have an account? <a routerLink="/login" class="text-decoration-none font-weight-bold" style="cursor: pointer;">Log in</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
